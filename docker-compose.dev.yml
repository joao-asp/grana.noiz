version: '3.8'

services:
  bot-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: bot-caixinha-dev
    restart: "no"
    volumes:
      # Hot reload - monta código fonte
      - ./src:/app/src
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backup:/app/backup
    environment:
      - PYTHONUNBUFFERED=1
      - ENV=development
      - DEBUG=true
    env_file:
      - .env.dev
    ports:
      - "8000:8000"  # Para futuras APIs de debug
    
    # Configurar logs para desenvolvimento
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"